name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_local
          POSTGRES_DB: erp_webcam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_webcam"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://erp:erp_local@localhost:5432/erp_webcam
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production-use-minimum-64-chars-long-padding

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        run: pytest -v
