name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_local
          POSTGRES_DB: erp_webcam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_webcam"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://erp:erp_local@localhost:5432/erp_webcam
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production-use-minimum-64-chars-long-padding

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.3.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Lint
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

      - name: Test
        run: poetry run pytest -v

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.3.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --with dev
          poetry run pip install 'setuptools<81'

      - name: SAST (bandit + ruff security rules)
        run: make sast

      - name: SCA (pip-audit)
        run: make sca

      - name: Secrets scan (detect-secrets vs baseline)
        run: make secrets-scan

      - name: Semgrep (OWASP Top 10)
        run: make semgrep-scan
